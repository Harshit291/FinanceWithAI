services:
  - type: web
    name: finance-with-ai-backend
    env: python
    # Run from repo root — requirements.txt lives under services/
    buildCommand: "pip install -r services/requirements.txt"
    startCommand: "uvicorn services.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # ── LLM Providers (set values in Render dashboard) ────────────────────
      - key: NVIDIA_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: SAMBANOVA_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      # ── Market data providers ─────────────────────────────────────────────
      - key: FINNHUB_API_KEY
        sync: false
      - key: INDIANAPI_API_KEY
        sync: false
    autoDeploy: true
